name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test-and-build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: make test

      - name: Build Binary
        run: make build

      - name: Build App Bundle
        run: make app

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: MemVRAM-macos-app
          path: bin/MemVRAM.app
